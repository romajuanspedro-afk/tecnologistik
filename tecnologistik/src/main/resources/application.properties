spring.application.name=tecnologistik

# Puerto: En Railway se asigna automáticamente via $PORT
server.port=${PORT:8080}

# Base de datos PostgreSQL
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT - IMPORTANTE: Cambiar en producción
jwt.secret=${JWT_SECRET:tecnologistik_dev_secret_cambiar_en_produccion_2026}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# Gemini AI API
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent

# CORS - Configurar para frontend en Vercel
spring.web.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
