spring.application.name=tecnologistik

server.port=${PORT:8081}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/tecnologistik}
spring.datasource.username=${DB_USER:tecnologistik_user}
spring.datasource.password=${DB_PASSWORD:admin123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Secreto para firmar los JWT. En producción SIEMPRE se debe definir
# la variable de entorno JWT_SECRET con un valor propio y largo.
jwt.secret=${JWT_SECRET:tecnologistik_dev_secret_cambiar_en_produccion_2026}
# Expiración del token en milisegundos (por defecto 1 hora)
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
